services:
  db:
    image: postgres:16-alpine
    container_name: cloudapp-db
    environment:
      POSTGRES_DB: cloudapp
      POSTGRES_USER: clouduser
      POSTGRES_PASSWORD: cloudpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: cloudapp-backend
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cloudapp
      DB_USER: clouduser
      DB_PASSWORD: cloudpass
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: cloudapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: